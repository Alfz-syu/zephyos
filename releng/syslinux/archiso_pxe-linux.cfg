LABEL arch_nbd
TEXT HELP
Boot the ZephyOS using NBD.
It allows you to install ZephyOS or perform system maintenance.
ENDTEXT
MENU LABEL ZephyOS (%ARCH%, NBD)
LINUX ::/%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux-cachyos
INITRD ::/%INSTALL_DIR%/boot/%ARCH%/initramfs-linux-cachyos.img
APPEND archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% archiso_nbd_srv=${pxeserver} cms_verify=y
SYSAPPEND 3

