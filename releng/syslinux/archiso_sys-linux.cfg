LABEL arch
TEXT HELP
Boot the ZephyOS on BIOS.
It allows you to install ZephyOS or perform system maintenance.
ENDTEXT
MENU LABEL ZephyOS (%ARCH%, BIOS)
LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux-cachyos
INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux-cachyos.img
APPEND archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL%

# Accessibility boot option
LABEL archspeech
TEXT HELP
Boot the ZephyOS on BIOS with speakup screen reader.
It allows you to install ZephyOS or perform system maintenance with speech feedback.
ENDTEXT
MENU LABEL ZephyOS (%ARCH%, BIOS) with ^speech
LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux-cachyos
INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux-cachyos.img
APPEND archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% accessibility=on
